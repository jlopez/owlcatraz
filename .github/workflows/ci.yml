name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: typecheck • lint • format • coverage • build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version-file: extension/.nvmrc
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm format:check

      # `pnpm coverage` = vitest run + v8 coverage + threshold gate (see
      # vitest.config.ts). A regression that drops below the configured floors
      # fails this step.
      - run: pnpm coverage

      - run: pnpm build
